# Server-side stack — pulls the prebuilt image from the local registry instead of building.
# deploy.sh copies this file to the server as docker-compose.yml.
#
# Machine-specific values come from /opt/doorwatch/.env on the server:
#   DOORWATCH_IMAGE  e.g. 192.168.1.x:5000/doorwatch:latest (deploy.sh also exports this)
#   HA_BASEURL       e.g. http://192.168.1.x:8123
#   RTSP_URL         camera stream URL including credentials
#   HA_TOKEN         Home Assistant long-lived access token
#
# It can also be pasted into Portainer as a stack: replace the env_file section with
# the four variables above defined on the stack itself.
services:
  doorwatch:
    image: ${DOORWATCH_IMAGE}
    restart: unless-stopped
    volumes:
      - doorwatch-data:/data
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
      - DoorWatch__Camera__Source=Rtsp
      - DoorWatch__Camera__RtspUrl=${RTSP_URL}
      - DoorWatch__Detector__Method=EdgeBased
      - DoorWatch__Detector__Roi__X=932
      - DoorWatch__Detector__Roi__Y=80
      - DoorWatch__Detector__Roi__Width=900
      - DoorWatch__Detector__Roi__Height=250
      - DoorWatch__Detector__EdgeChangeThresholdPercent=18
      - DoorWatch__Detector__EdgeCloseThresholdPercent=10
      - DoorWatch__Detector__NightEdgeChangeThresholdPercent=9
      - DoorWatch__Detector__NightEdgeCloseThresholdPercent=7
      - DoorWatch__Detector__BaselineImagePath=/data/baseline.png
      - DoorWatch__HomeAssistant__BaseUrl=${HA_BASEURL}
      - DoorWatch__HomeAssistant__Token=${HA_TOKEN}
      - DoorWatch__HomeAssistant__EntityId=input_boolean.detected_door_state

volumes:
  doorwatch-data:
